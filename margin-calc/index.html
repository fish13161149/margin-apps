<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon利润计算器 - MarginCalc</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px; width: 100%; max-width: 400px; }
    h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 24px; text-align: center; }
    .input-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; padding: 12px 14px; border: 2px solid #e5e5e5; border-radius: 10px; font-size: 16px; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #FF9900; }
    .fee-row { display: flex; gap: 12px; }
    .fee-row .input-group { flex: 1; }
    button { width: 100%; padding: 14px; background: #FF9900; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    button:hover { background: #e68a00; }
    .result { margin-top: 24px; padding: 20px; background: #f8f9fa; border-radius: 12px; display: none; }
    .result.show { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e5e5e5; }
    .result-row:last-child { border-bottom: none; }
    .result-label { color: #666; font-size: 14px; }
    .result-value { font-weight: 700; font-size: 16px; }
    .profit { color: #00a862; }
    .loss { color: #ff3b30; }
    .big-profit { font-size: 28px; text-align: center; padding: 16px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Amazon利润计算器</h1>
    <div class="input-group">
      <label>采购成本 ($)</label>
      <input type="number" id="cost" placeholder="0.00" step="0.01">
    </div>
    <div class="input-group">
      <label>销售价格 ($)</label>
      <input type="number" id="price" placeholder="0.00" step="0.01">
    </div>
    <div class="input-group">
      <label>运费 ($)</label>
      <input type="number" id="shipping" placeholder="0.00" step="0.01">
    </div>
    <div class="fee-row">
      <div class="input-group">
        <label>平台费 (%)</label>
        <input type="number" id="fee" value="15" placeholder="15">
      </div>
      <div class="input-group">
        <label>其他费用 ($)</label>
        <input type="number" id="other" value="0" placeholder="0.00" step="0.01">
      </div>
    </div>
    <button onclick="calculate()">计算利润</button>
    <div class="result" id="result">
      <div class="result-row big-profit" id="bigProfit"></div>
      <div class="result-row">
        <span class="result-label">总成本</span>
        <span class="result-value" id="totalCost">$0.00</span>
      </div>
      <div class="result-row">
        <span class="result-label">利润</span>
        <span class="result-value" id="profit">$0.00</span>
      </div>
      <div class="result-row">
        <span class="result-label">ROI</span>
        <span class="result-value" id="roi">0%</span>
      </div>
      <div class="result-row">
        <span class="result-label">利润率</span>
        <span class="result-value" id="margin">0%</span>
      </div>
    </div>
  </div>
  <script>
    function calculate() {
      const cost = parseFloat(document.getElementById('cost').value) || 0;
      const price = parseFloat(document.getElementById('price').value) || 0;
      const shipping = parseFloat(document.getElementById('shipping').value) || 0;
      const feePercent = parseFloat(document.getElementById('fee').value) || 15;
      const other = parseFloat(document.getElementById('other').value) || 0;
      
      const fee = price * (feePercent / 100);
      const totalCost = cost + shipping + fee + other;
      const profit = price - totalCost;
      const roi = totalCost > 0 ? ((profit / totalCost) * 100) : 0;
      const margin = price > 0 ? ((profit / price) * 100) : 0;
      
      const isProfit = profit >= 0;
      const colorClass = isProfit ? 'profit' : 'loss';
      const profitText = isProfit ? `+$${profit.toFixed(2)}` : `-$${Math.abs(profit).toFixed(2)}`;
      
      document.getElementById('bigProfit').innerHTML = `<span class="${colorClass}">${profitText}</span>`;
      document.getElementById('totalCost').textContent = `$${totalCost.toFixed(2)}`;
      document.getElementById('profit').textContent = profitText;
      document.getElementById('profit').className = `result-value ${colorClass}`;
      document.getElementById('roi').textContent = `${roi.toFixed(1)}%`;
      document.getElementById('roi').className = `result-value ${colorClass}`;
      document.getElementById('margin').textContent = `${margin.toFixed(1)}%`;
      document.getElementById('margin').className = `result-value ${colorClass}`;
      
      document.getElementById('result').classList.add('show');
    }
  </script>
</body>
</html>
