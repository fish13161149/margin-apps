<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贷款计算器</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 24px; width: 100%; max-width: 400px; }
    h1 { font-size: 18px; color: #333; margin-bottom: 20px; text-align: center; }
    .input-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 14px; background: #E53935; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .result { margin-top: 20px; padding: 16px; background: #fff3f3; border-radius: 8px; display: none; }
    .result.show { display: block; }
    .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    .result-row:last-child { border: none; font-weight: 700; font-size: 18px; color: #E53935; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏦 贷款计算器</h1>
    <div class="input-group">
      <label>贷款金额（元）</label>
      <input type="number" id="amount" placeholder="例如：500000">
    </div>
    <div class="input-group">
      <label>贷款期限（月）</label>
      <input type="number" id="months" placeholder="例如：240" value="360">
    </div>
    <div class="input-group">
      <label>年利率（%）</label>
      <input type="number" id="rate" placeholder="例如：4.9" value="4.9" step="0.01">
    </div>
    <div class="input-group">
      <label>还款方式</label>
      <select id="type">
        <option value="1">等额本息（月供固定）</option>
        <option value="2">等额本金（每月递减）</option>
      </select>
    </div>
    <button onclick="calculate()">计算月供</button>
    <div class="result" id="result">
      <div class="result-row"><span>月供</span><span id="monthly"></span></div>
      <div class="result-row"><span>总利息</span><span id="totalInterest"></span></div>
      <div class="result-row"><span>还款总额</span><span id="total"></span></div>
    </div>
  </div>
  <script>
    function calculate() {
      const amount = parseFloat(document.getElementById('amount').value);
      const months = parseInt(document.getElementById('months').value);
      const rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
      const type = parseInt(document.getElementById('type').value);
      if (!amount || !months || !rate) { alert('请填写完整'); return; }
      let monthly, totalInterest, total;
      if (type === 1) {
        monthly = amount * rate * Math.pow(1 + rate, months) / (Math.pow(1 + rate, months) - 1);
        total = monthly * months;
        totalInterest = total - amount;
      } else {
        const first = amount / months + amount * rate;
        const last = amount / months + amount * rate / months;
        monthly = (first + last) / 2;
        total = (amount / months + amount * rate) * months + amount * rate * (months + 1) / 2 / months * months - amount * rate;
        totalInterest = total - amount;
      }
      document.getElementById('monthly').textContent = '¥' + monthly.toFixed(2);
      document.getElementById('totalInterest').textContent = '¥' + totalInterest.toFixed(2);
      document.getElementById('total').textContent = '¥' + total.toFixed(2);
      document.getElementById('result').classList.add('show');
    }
  </script>
</body>
</html>
