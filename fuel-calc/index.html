<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>油耗计算器</title>
  <link rel="manifest" href="manifest.json">
  <style>body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:20px}.container{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);padding:24px;width:100%;max-width:400px}h1{font-size:18px;text-align:center;margin-bottom:20px}.input-group{margin-bottom:16px}label{display:block;font-size:13px;color:#666;margin-bottom:6px}input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}button{width:100%;padding:14px;background:#FB8C00;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}.result{margin-top:20px;padding:16px;background:#fef6e6;border-radius:8px;display:none}.result.show{display:block}.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}.row:last-child{border:none;font-weight:700;font-size:18px;color:#FB8C00}</style>
</head>
<body>
<div class="container">
<h1>⛽ 油耗计算器</h1>
<div class="input-group"><label>加油金额（元）</label><input type="number" id="money" placeholder="例如：300"></div>
<div class="input-group"><label>油价（元/升）</label><input type="number" id="price" value="7.5" step="0.01"></div>
<div class="input-group"><label>行驶里程（公里）</label><input type="number" id="distance" placeholder="例如：500"></div>
<button onclick="calc()">计算油耗</button>
<div class="result" id="result">
<div class="row"><span>百公里油耗</span><span id="per100"></span></div>
<div class="row"><span>每公里费用</span><span id="perKm"></span></div>
</div>
</div>
<script>function calc(){var m=parseFloat(document.getElementById('money').value);var p=parseFloat(document.getElementById('price').value);var d=parseFloat(document.getElementById('distance').value);if(!m||!p||!d){alert('请填写完整');return}var liters=m/p;var per100=(liters/d*100).toFixed(2);var perKm=(m/d).toFixed(2);document.getElementById('per100').textContent=per100+'L';document.getElementById('perKm').textContent='¥'+perKm;document.getElementById('result').classList.add('show')}</script>
</body>
</html>
