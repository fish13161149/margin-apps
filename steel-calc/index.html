<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>钢筋重量计算器</title><link rel="manifest" href="manifest.json"><style>body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:20px}.container{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);padding:24px;width:100%;max-width:400px}h1{font-size:18px;text-align:center;margin-bottom:20px}.input-group{margin-bottom:16px}label{display:block;font-size:13px;color:#666;margin-bottom:6px}input,select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}button{width:100%;padding:14px;background:#455A64;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}.result{margin-top:20px;padding:16px;background:#f0f2f4;border-radius:8px;display:none}.result.show{display:block}.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}.row:last-child{border:none;font-weight:700;font-size:18px;color:#455A64}</style></head>
<body><div class="container"><h1>🔩 钢筋重量计算器</h1><div class="input-group"><label>钢筋直径</label><select id="diameter"><option value="6">Φ6</option><option value="8">Φ8</option><option value="10">Φ10</option><option value="12" selected>Φ12</option><option value="14">Φ14</option><option value="16">Φ16</option><option value="18">Φ18</option><option value="20">Φ20</option><option value="22">Φ22</option><option value="25">Φ25</option><option value="28">Φ28</option><option value="32">Φ32</option></select></div><div class="input-group"><label>长度（米）</label><input type="number" id="length" placeholder="例如：100"></div><div class="input-group"><label>根数</label><input type="number" id="count" value="1"></div><button onclick="calc()">计算重量</button><div class="result" id="result"><div class="row"><span>单根重量</span><span id="single"></span></div><div class="row"><span>总重量</span><span id="total"></span></div></div></div>
<script>function calc(){var d=parseFloat(document.getElementById('diameter').value);var l=parseFloat(document.getElementById('length').value);var c=parseInt(document.getElementById('count').value);if(!l){alert('请填写完整');return}var w=d*d*0.00617*l/1000;var tw=w*c;document.getElementById('single').textContent=w.toFixed(3)+'kg';document.getElementById('total').textContent=tw.toFixed(2)+'kg';document.getElementById('result').classList.add('show')}</script></body></html>
