<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跑步配速计算器</title>
  <link rel="manifest" href="manifest.json">
  <style>body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:20px}.container{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);padding:24px;width:100%;max-width:400px}h1{font-size:18px;text-align:center;margin-bottom:20px}.input-group{margin-bottom:16px}label{display:block;font-size:13px;color:#666;margin-bottom:6px}input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}button{width:100%;padding:14px;background:#8E24AA;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}.result{margin-top:20px;padding:16px;background:#faf3fc;border-radius:8px;display:none}.result.show{display:block}.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}.row:last-child{border:none;font-weight:700;font-size:18px;color:#8E24AA}</style>
</head>
<body>
<div class="container">
<h1>🏃 跑步配速计算器</h1>
<div class="input-group"><label>目标距离（公里）</label><input type="number" id="distance" value="42.195" placeholder="马拉松42.195"></div>
<div class="input-group"><label>目标时间（小时：分钟）</label><input type="text" id="time" placeholder="4:30" value="4:00"></div>
<button onclick="calc()">计算配速</button>
<div class="result" id="result">
<div class="row"><span>所需配速</span><span id="pace"></span></div>
<div class="row"><span>每公里用时</span><span id="perKm"></span></div>
</div>
</div>
<script>function calc(){var d=parseFloat(document.getElementById('distance').value);var t=document.getElementById('time').value.split(':');var minutes=parseInt(t[0])*60+(t[1]?parseInt(t[1]):0);if(!d||!minutes){alert('请填写完整');return}var paceMin=minutes/d;var paceM=Math.floor(paceMin);var paceS=Math.round((paceMin-paceM)*60);document.getElementById('pace').textContent=paceM+':'+String(paceS).padStart(2,'0')+'/km';document.getElementById('perKm').textContent=paceM+'分'+paceS+'秒';document.getElementById('result').classList.add('show')}</script>
</body>
</html>
