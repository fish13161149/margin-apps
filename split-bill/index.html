<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>分账计算器</title><link rel="manifest" href="manifest.json"><style>body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:20px}.container{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);padding:24px;width:100%;max-width:400px}h1{font-size:18px;text-align:center;margin-bottom:20px}.input-group{margin-bottom:16px}label{display:block;font-size:13px;color:#666;margin-bottom:6px}input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}button{width:100%;padding:14px;background:#7CB342;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}.result{margin-top:20px;padding:16px;background:#f4f9e8;border-radius:8px;display:none}.result.show{display:block}.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}.row:last-child{border:none;font-weight:700;font-size:18px;color:#7CB342}</style></head>
<body><div class="container"><h1>💵 分账计算器</h1><div class="input-group"><label>总金额（元）</label><input type="number" id="total" placeholder="例如：356"></div><div class="input-group"><label>人数</label><input type="number" id="people" value="4"></div><button onclick="calc()">计算</button><div class="result" id="result"><div class="row"><span>每人应付</span><span id="each"></span></div></div></div>
<script>function calc(){var t=parseFloat(document.getElementById('total').value);var p=parseInt(document.getElementById('people').value);if(!t||!p){alert('请填写完整');return}document.getElementById('each').textContent='¥'+(t/p).toFixed(2);document.getElementById('result').classList.add('show')}</script></body></html>
