<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>卡路里计算器</title><link rel="manifest" href="manifest.json"><style>body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:20px}.container{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);padding:24px;width:100%;max-width:400px}h1{font-size:18px;text-align:center;margin-bottom:20px}.input-group{margin-bottom:16px}label{display:block;font-size:13px;color:#666;margin-bottom:6px}input,select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}button{width:100%;padding:14px;background:#FF7043;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}.result{margin-top:20px;padding:16px;background:#fff3ef;border-radius:8px;display:none}.result.show{display:block}.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}.row:last-child{border:none;font-weight:700;font-size:18px;color:#FF7043}</style></head>
<body><div class="container"><h1>🔥 卡路里计算器</h1><div class="input-group"><label>性别</label><select id="gender"><option value="1">男</option><option value="2">女</option></select></div><div class="input-group"><label>年龄</label><input type="number" id="age" placeholder="例如：30"></div><div class="input-group"><label>体重（kg）</label><input type="number" id="weight" placeholder="例如：70"></div><div class="input-group"><label>身高（cm）</label><input type="number" id="height" placeholder="例如：175"></div><button onclick="calc()">计算基础代谢</button><div class="result" id="result"><div class="row"><span>基础代谢</span><span id="bmr"></span></div><div class="row"><span>建议摄入</span><span id="tdee"></span></div></div></div>
<script>function calc(){var g=parseInt(document.getElementById('gender').value);var a=parseFloat(document.getElementById('age').value);var w=parseFloat(document.getElementById('weight').value);var h=parseFloat(document.getElementById('height').value);if(!a||!w||!h){alert('请填写完整');return}var bmr=g==1?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;document.getElementById('bmr').textContent=Math.round(bmr)+'千卡';document.getElementById('tdee').textContent=Math.round(bmr*1.55)+'千卡/天';document.getElementById('result').classList.add('show')}</script></body></html>
