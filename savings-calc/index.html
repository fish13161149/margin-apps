<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>储蓄利息计算器</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 24px; width: 100%; max-width: 400px; }
    h1 { font-size: 18px; color: #333; margin-bottom: 20px; text-align: center; }
    .input-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 14px; background: #43A047; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .result { margin-top: 20px; padding: 16px; background: #f3f9f3; border-radius: 8px; display: none; }
    .result.show { display: block; }
    .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    .result-row:last-child { border: none; font-weight: 700; font-size: 18px; color: #43A047; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💰 储蓄利息计算器</h1>
    <div class="input-group">
      <label>存款本金（元）</label>
      <input type="number" id="principal" placeholder="例如：100000">
    </div>
    <div class="input-group">
      <label>存期</label>
      <select id="term">
        <option value="3">3个月</option>
        <option value="6">6个月</option>
        <option value="12" selected>1年</option>
        <option value="24">2年</option>
        <option value="36">3年</option>
        <option value="60">5年</option>
      </select>
    </div>
    <div class="input-group">
      <label>年利率（%）</label>
      <input type="number" id="rate" placeholder="例如：1.75" value="1.75" step="0.01">
    </div>
    <button onclick="calculate()">计算收益</button>
    <div class="result" id="result">
      <div class="result-row"><span>到期利息</span><span id="interest"></span></div>
      <div class="result-row"><span>本息合计</span><span id="total"></span></div>
    </div>
  </div>
  <script>
    function calculate() {
      const p = parseFloat(document.getElementById('principal').value);
      const m = parseInt(document.getElementById('term').value);
      const r = parseFloat(document.getElementById('rate').value) / 100;
      if (!p || !r) { alert('请填写完整'); return; }
      const interest = p * r * m / 12;
      document.getElementById('interest').textContent = '¥' + interest.toFixed(2);
      document.getElementById('total').textContent = '¥' + (p + interest).toFixed(2);
      document.getElementById('result').classList.add('show');
    }
  </script>
</body>
</html>
