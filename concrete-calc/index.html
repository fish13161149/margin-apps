<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>混凝土用量计算器</title><link rel="manifest" href="manifest.json"><style>body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:20px}.container{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);padding:24px;width:100%;max-width:400px}h1{font-size:18px;text-align:center;margin-bottom:20px}.input-group{margin-bottom:16px}label{display:block;font-size:13px;color:#666;margin-bottom:6px}input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}button{width:100%;padding:14px;background:#5D4037;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}.result{margin-top:20px;padding:16px;background:#f5f0ed;border-radius:8px;display:none}.result.show{display:block}.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}.row:last-child{border:none;font-weight:700;font-size:18px;color:#5D4037}</style></head>
<body><div class="container"><h1>🏗️ 混凝土用量计算器</h1><div class="input-group"><label>长度（米）</label><input type="number" id="length" placeholder="例如：10"></div><div class="input-group"><label>宽度（米）</label><input type="number" id="width" placeholder="例如：5"></div><div class="input-group"><label>厚度（厘米）</label><input type="number" id="thick" placeholder="例如：10"></div><button onclick="calc()">计算</button><div class="result" id="result"><div class="row"><span>混凝土体积</span><span id="volume"></span></div><div class="row"><span>水泥(42.5)</span><span id="cement"></span></div><div class="row"><span>沙子</span><span id="sand"></span></div><div class="row"><span>石子</span><span id="stone"></span></div></div></div>
<script>function calc(){var l=parseFloat(document.getElementById('length').value);var w=parseFloat(document.getElementById('width').value);var t=parseFloat(document.getElementById('thick').value)/100;if(!l||!w||!t){alert('请填写完整');return}var v=l*w*t;document.getElementById('volume').textContent=v.toFixed(2)+'立方米';document.getElementById('cement').textContent=(v*350).toFixed(0)+'kg';document.getElementById('sand').textContent=(v*0.45).toFixed(2)+'吨';document.getElementById('stone').textContent=(v*0.9).toFixed(2)+'吨';document.getElementById('result').classList.add('show')}</script></body></html>
