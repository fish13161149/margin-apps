<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小费计算器 - TipCalc</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 28px; width: 100%; max-width: 360px; }
    h1 { font-size: 18px; text-align: center; margin-bottom: 20px; }
    .input-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    input { width: 100%; padding: 12px; border: 2px solid #e5e5e5; border-radius: 10px; font-size: 16px; }
    .tip-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .tip-btn { padding: 10px; border: 2px solid #e5e5e5; border-radius: 8px; background: white; font-size: 14px; cursor: pointer; }
    .tip-btn.active { border-color: #34C759; background: #e8f5e9; }
    button { width: 100%; padding: 14px; background: #34C759; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .result { margin-top: 20px; padding: 16px; background: #f8f9fa; border-radius: 10px; display: none; }
    .result.show { display: block; }
    .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e5e5e5; }
    .result-row:last-child { border: none; font-weight: 700; font-size: 18px; }
    .highlight { color: #34C759; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍽️ 小费计算器</h1>
    <div class="input-group">
      <label>账单金额 ($)</label>
      <input type="number" id="bill" placeholder="0.00" step="0.01">
    </div>
    <label>小费比例</label>
    <div class="tip-buttons">
      <button class="tip-btn" onclick="setTip(10)">10%</button>
      <button class="tip-btn" onclick="setTip(15)">15%</button>
      <button class="tip-btn" onclick="setTip(18)">18%</button>
      <button class="tip-btn" onclick="setTip(20)">20%</button>
    </div>
    <div class="input-group">
      <label>自定义小费比例 (%)</label>
      <input type="number" id="tipPercent" value="15">
    </div>
    <div class="input-group">
      <label>人数</label>
      <input type="number" id="people" value="1" min="1">
    </div>
    <button onclick="calculate()">计算</button>
    <div class="result" id="result">
      <div class="result-row"><span>小费</span><span id="tipAmt">$0.00</span></div>
      <div class="result-row"><span>总额</span><span id="total">$0.00</span></div>
      <div class="result-row"><span>每人</span><span class="highlight" id="perPerson">$0.00</span></div>
    </div>
  </div>
  <script>
    function setTip(p) {
      document.getElementById('tipPercent').value = p;
      document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }
    function calculate() {
      const bill = parseFloat(document.getElementById('bill').value) || 0;
      const tipP = parseFloat(document.getElementById('tipPercent').value) || 0;
      const people = parseInt(document.getElementById('people').value) || 1;
      const tip = bill * (tipP / 100);
      const total = bill + tip;
      const per = total / people;
      document.getElementById('tipAmt').textContent = '$' + tip.toFixed(2);
      document.getElementById('total').textContent = '$' + total.toFixed(2);
      document.getElementById('perPerson').textContent = '$' + per.toFixed(2);
      document.getElementById('result').classList.add('show');
    }
  </script>
</body>
</html>
